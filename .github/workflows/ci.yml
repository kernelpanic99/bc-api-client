name: CI
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mise install
        uses: jdx/mise-action@v3

      - name: Install dependencies
        run: mise x -- pnpm install --frozen-lockfile

      - name: Quality checks
        run: mise x -- pnpm qa
